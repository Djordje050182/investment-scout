name: Intraday Quotes

on:
  schedule:
    # Every 30 minutes through the US session (13:30-21:00 UTC), weekdays.
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: intraday-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh quotes
        env:
          SCOUT_UNIVERSE: all
        run: python -m engine.refresh_quotes

      - name: Commit quotes
        run: |
          git config user.name "investment-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/quotes.json
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "data: intraday quotes refresh"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
