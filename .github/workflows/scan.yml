# .github/workflows/scan.yml
name: Daily Scan

on:
  schedule:
    # 21:30 UTC ~ shortly after US market close (16:30 ET / 17:30 EDT).
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # manual "Run now" button

permissions:
  contents: write          # allow committing results back

concurrency:
  group: daily-scan        # never let two scans race on the commit/push
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SCOUT_UNIVERSE: all
        run: python -m engine.run_scan

      - name: Update track record
        run: python -m engine.track_record

      - name: Commit results
        run: |
          git config user.name "investment-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/signals.json docs/data/history docs/data/track_record.json
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "data: daily scan $(date -u +%Y-%m-%d)"
            # rebase on any concurrent changes before pushing so the daily
            # auto-commit can't get permanently wedged by a push race.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
